name: Bug Report
description: Report a bug or unexpected behavior in teststop
title: "[BUG] "
labels: ["type/bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `teststop run` on a Node.js project
        2. With ANTHROPIC_API_KEY set
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error output.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - reader (language detection / scanning)
        - mandate (composition)
        - ai (Claude / OpenAI adapter)
        - memory (confidence / store / retire)
        - reporter (JSON / text / markdown)
        - cli (command parsing)
        - unknown
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 14.5, Go 1.23, TESTSTOP_AI=claude"
    validations:
      required: true

  - type: input
    id: teststop_version
    attributes:
      label: teststop Version
      placeholder: "v0.1.0 or git sha"
    validations:
      required: true
