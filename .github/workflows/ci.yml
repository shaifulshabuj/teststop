name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Verify go.sum is clean
        run: |
          go mod tidy
          git diff --exit-code go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race ./...

      - name: Vet
        run: go vet ./...
