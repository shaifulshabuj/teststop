version: 2
project_name: teststop

builds:
  - main: ./cmd/teststop
    binary: teststop
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^chore:']

release:
  github:
    owner: shaifulshabuj
    name: teststop
  # Tags containing a pre-release suffix (e.g. v0.3.0-rc.1) are marked as
  # GitHub pre-releases automatically.
  prerelease: auto
