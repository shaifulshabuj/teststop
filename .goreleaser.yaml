version: 2
project_name: teststop

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/teststop
    binary: teststop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md
      - MANDATE.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^Merge'

release:
  github:
    owner: shaifulshabuj
    name: teststop
  draft: false
  prerelease: auto
  name_template: "teststop {{.Version}}"
